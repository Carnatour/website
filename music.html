      <h2 class="section-heading">My Music</h2>

      <figure class="video-card">
        <figcaption>moments worth a lifetime — for flute, violin, cello, and clarinet - (6 minutes)&nbsp;·&nbsp; <span>video</span></figcaption>
        <p class="card-description">"This piece was written to express instances in life where I feel greatly dissatisfied looking at
myself and how I am in relation to my goals. Each time I become extremely frustrated at
myself. And each time when reach my lowest point, I suddenly gain perspective. Sometimes
this means stepping outside into a bright world and seeing a brilliant blue sky or a strangers smile. Every time I am reminded of the great gift of life we find ourselves
with on this planet. These precious moments are invaluable; they remind me that life is worth
living."</p>
        <div class="video-wrapper">
          <iframe src="https://www.youtube-nocookie.com/embed/1wrvHyH3k50" title="Kennedy Brendan moments worth a lifetime" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
        </div>
      </figure>

      <figure class="audio-card">
        <figcaption>life through a window — for solo piano - 4 minutes (2025)</figcaption>
        <p class="card-description">"This piece was written for times where I have found myself on a train, a long car ride, or
flight. As I look out the window, the passing scenery blurs into passing time. I find myself
looking back at my life: reliving good memories, painful ends, and regrets. I realize there is
no way to go back and change anything. All I can do now is be present in the now, not the
past or the future."</p>
        <audio controls src="lifethroughwindowrecording.mp3"></audio>
        <a href="lifethroughwindowrecording.mp3">Download audio</a>
      </figure>

      <figure class="audio-card">
        <figcaption>to have a friend — for solo piano - 2 minutes (2025)</figcaption>
        <p class="card-description">"I found myself reflecting on the friendships throughout my life. There is a certain warmth and safety you feel with a good friend, an easiness. This piece captures that feeling."</p>
        <audio controls src="to have a friend.m4a"></audio>
        <a href="moments worth piano 2.mp3">Download audio</a>
      </figure>
